name: Build Solitaire IPA

on: workflow_dispatch

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Build for device (unsigned)
        run: |
          xcodebuild -project Solitaire.xcodeproj \
            -scheme Solitaire \
            -sdk iphoneos \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            ARCHS=arm64 \
            -derivedDataPath build

      - name: Package IPA
        run: |
          mkdir -p Payload
          cp -r build/Build/Products/Release-iphoneos/Solitaire.app Payload/
          zip -r Solitaire.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Solitaire-IPA
          path: Solitaire.ipa
