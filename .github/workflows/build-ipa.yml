name: Build Solitaire IPA

on: workflow_dispatch

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Build for device (ad-hoc signed)
        run: |
          xcodebuild -project Solitaire.xcodeproj \
            -scheme Solitaire \
            -sdk iphoneos \
            -configuration Release \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=YES \
            CODE_SIGNING_ALLOWED=YES \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            ARCHS=arm64 \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            -derivedDataPath build

      - name: Re-sign with ldid for sideloading
        run: |
          brew install ldid
          APP_PATH="build/Build/Products/Release-iphoneos/Solitaire.app"
          cat > /tmp/ent.xml << 'ENTXML'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>platform-application</key>
            <true/>
            <key>get-task-allow</key>
            <true/>
          </dict>
          </plist>
          ENTXML
          ldid -S/tmp/ent.xml "$APP_PATH/Solitaire"

      - name: Package IPA
        run: |
          mkdir -p Payload
          cp -r build/Build/Products/Release-iphoneos/Solitaire.app Payload/
          zip -r Solitaire.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Solitaire-IPA
          path: Solitaire.ipa
